}

  font-size: 11pt;

  color: #333;
}

ul, ol {
  margin-left: 20px;
  max-height: 500px;
  overflow: hidden;
}

strong {
  color: #2D4A7C;

}

  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'Consolas', 'Monaco', monospace;
  font-size: 10pt;
}

pre {
  background-color: #1a1a1a;

  box-shadow: 0 2px 6px rgba(0,0,0,0.2);

}

  font-size: 10pt;

}

.two-columns {

  grid-template-columns: 1fr 1fr;

}

}

  justify-content: center;

section.final-slide h1,

}

  color: white !important;
}

  max-width: 95%;

}
