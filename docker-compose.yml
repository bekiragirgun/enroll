services:
  db:
    image: postgres:15
    container_name: ders_takip_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_pass}
      POSTGRES_DB: ${DB_NAME:-ders_takip}
    # Eventlet + psycopg2 sorunları için authentication timeout'u 60s → 180s.
    # Eğer app container greenlet yield edemezse PG auth iptal etmeden daha çok
    # zaman tanır.
    command:
      - postgres
      - -c
      - authentication_timeout=180s
      - -c
      - max_connections=200
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ders_takip"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  # ─────────────────────────────────────────────────────────────────────
  # NOT: Flask uygulaması artık BAREMETAL çalışıyor (manage.sh + conda).
  # Docker Desktop NAT katmanı zayıf network'lü öğrencilerde latency yapıyordu
  # + Python 3.14 / eventlet uyumsuzluğu sorun çıkarıyordu (Nisan 2026).
  #
  # Baremetal başlatma:
  #   docker compose up -d         # sadece db (default — bu profile dışında)
  #   ./manage.sh start            # Flask'ı conda Python 3.11 ile başlatır
  #
  # Eski Docker modunu (acil durum / referans için) çalıştırmak istersen:
  #   docker compose --profile docker up -d app
  #
  # `profiles: [docker]` sayesinde `docker compose up -d` bu servisi
  # OTOMATİK BAŞLATMAZ — port 3333 baremetal Flask için serbest kalır.
  # ─────────────────────────────────────────────────────────────────────
  app:
    profiles: [docker]
    build: .
    container_name: ders_takip_app
    depends_on:
      - db
    environment:
      - DB_TYPE=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASS=${DB_PASSWORD:-postgres_pass}
      - DB_NAME=${DB_NAME:-ders_takip}
      - SECRET_KEY=${SECRET_KEY}
      # Chroot SSH — .env'den okunur. app.py --host/--user/--pass verildiğinde
      # os.environ override edildiği için CLI argümanı her zaman bu env'leri ezer.
      - CHROOT_HOST=${CHROOT_HOST:-}
      - CHROOT_SSH_PORT=${CHROOT_SSH_PORT:-22}
      - CHROOT_REAL_SSH_PORT=${CHROOT_REAL_SSH_PORT:-22}
      - CHROOT_USER=${CHROOT_USER:-root}
      - CHROOT_PASS=${CHROOT_PASS:-}
    ports:
      - "3333:3333"
    volumes:
      - ./data:/app/data
      # Slayt kök klasörü — read-only mount, host path container içinde de aynı yere bağlanır.
      # .env'deki SLIDE_HOST_BASE altındaki TÜM alt klasörler otomatik erişilebilir;
      # böylece kullanıcı UI'dan farklı alt klasörler girse de docker recreate gerekmez.
      - ${SLIDE_HOST_BASE:-/tmp/empty-slaytlar}:${SLIDE_HOST_BASE:-/tmp/empty-slaytlar}:ro
    # Healthcheck — app donarsa veya CPU tırmanırsa healthcheck fail olur,
    # docker otomatik restart eder.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3333/api/durum', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    mem_limit: 1g
    # restart: always KALDIRILDI — Docker daemon her açıldığında container'ı
    # otomatik açıp port 3333'ü baremetal Flask'tan çalıyordu.
    restart: "no"
