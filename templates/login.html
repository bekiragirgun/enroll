<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGY106 Linux İşletim Sistemleri — Ders Takip</title>
  <link rel="stylesheet" href="/static/css/stil.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f1117 0%, #1a1f2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-container {
      background: rgba(26, 31, 46, 0.95);
      border: 1px solid #2d3748;
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 450px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
    }

    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo h1 {
      font-size: 1.5rem;
      color: #90cdf4;
      margin-bottom: 0.5rem;
      font-weight: 700;
    }

    .logo p {
      color: #718096;
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      color: #cbd5e0;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .form-group select,
    .form-group input {
      width: 100%;
      padding: 0.85rem 1rem;
      background: #0f1117;
      border: 1px solid #4a5568;
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 1rem;
      transition: all 0.2s;
      box-sizing: border-box;
    }

    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: #4299e1;
      box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
    }

    .btn-submit {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #4299e1 0%, #3182ce 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(66, 153, 225, 0.3);
    }

    .ders-paketi {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .ders-paketi label {
      flex: 1;
      padding: 1rem;
      background: #0f1117;
      border: 2px solid #4a5568;
      border-radius: 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #718096;
      font-weight: 600;
    }

    .ders-paketi input[type="radio"] {
      display: none;
    }

    .ders-paketi input[type="radio"]:checked + label {
      border-color: #4299e1;
      background: rgba(66, 153, 225, 0.2);
      color: #90cdf4;
    }

    {% if hata %}
    .error {
      background: rgba(229, 62, 62, 0.1);
      border: 1px solid #e53e3e;
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1.5rem;
      color: #fc8181;
      font-size: 0.9rem;
      text-align: center;
    }
    {% endif %}
  </style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <h1>💻 İşletim Sistemleri</h1>
    <p>Kapadokya Üniversitesi — BGY106</p>
  </div>

  {% if hata %}
  <div class="error">
    ⚠️ {{ hata }}
  </div>
  {% endif %}

  <form method="POST" action="/giris">
    <div class="form-group">
      <label for="ogrenci_id">Öğrenci Seçiniz</label>
      <select id="ogrenci_id" name="ogrenci_id" required>
        <option value="">-- Öğrenci Seçin --</option>
        {% for ogrenci in ogrenciler %}
        <option value="{{ ogrenci.id }}">{{ ogrenci.ad }} {{ ogrenci.soyad }} ({{ ogrenci.numara }})</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="sifre">Şifre (Öğrenci Numaranız)</label>
      <input type="password" id="sifre" name="sifre" required
             placeholder="Öğrenci numaranızı giriniz"
             pattern="[0-9]+">
    </div>

    <div class="form-group">
      <label>Ders Paketi Seçiniz</label>
      <div class="ders-paketi">
        <input type="radio" id="pakets" name="ders_paketi" value="1" required>
        <label for="pakets">Paket 1</label>

        <input type="radio" id="paket2" name="ders_paketi" value="2">
        <label for="paket2">Paket 2</label>

        <input type="radio" id="paket3" name="ders_paketi" value="3">
        <label for="paket3">Paket 3</label>
      </div>
    </div>

    <button type="submit" class="btn-submit">
      📝 Kayıt Ol
    </button>
  </form>
</div>

</body>
</html>
