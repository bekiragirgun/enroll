<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Öğretmen Terminal Yayını</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a202c; color:#e2e8f0; font-family:system-ui,sans-serif; height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  .header { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#2d3748; border-bottom:2px solid #ed8936; flex-shrink:0; flex-wrap:wrap; gap:8px; }
  .header h1 { font-size:16px; font-weight:700; color:#fbd38d; }
  .header .info { font-size:13px; color:#a0aec0; display:flex; align-items:center; gap:6px; }
  .durum { width:8px; height:8px; border-radius:50%; background:#e53e3e; display:inline-block; }
  .durum.bagli { background:#48bb78; }
  .ogrenci-sayisi { background:#ed8936; color:#1a202c; padding:2px 10px; border-radius:10px; font-size:12px; font-weight:700; }
  .btn { padding:5px 14px; border:none; border-radius:4px; cursor:pointer; font-size:13px; font-weight:600; }
  .btn-temizle { background:#ed8936; color:#1a202c; }
  .btn-temizle:hover { background:#dd6b20; }
  .btn-don { background:#4a5568; color:#e2e8f0; }
  .btn-don:hover { background:#718096; }

  .ana-icerik { flex:1; display:flex; min-height:0; gap:0; }

  .terminal-area { flex:1; padding:8px; min-height:0; display:flex; flex-direction:column; }
  .panel-baslik { padding:6px 12px; background:#744210; color:#fefcbf; font-size:13px; font-weight:600; border-radius:6px 6px 0 0; border:1px solid #ed8936; border-bottom:none; flex-shrink:0; }
  .terminal-wrap { flex:1; border:1px solid #ed8936; border-radius:0 0 6px 6px; min-height:0; }

  /* İzleme Paneli */
  .izleme-sidebar { width:280px; background:#2d3748; border-left:1px solid #4a5568; display:flex; flex-direction:column; flex-shrink:0; }
  .izleme-sidebar-baslik { padding:8px 12px; background:#2c5282; color:#bee3f8; font-size:13px; font-weight:600; border-bottom:1px solid #4a5568; }
  .izleme-liste { flex:1; overflow-y:auto; padding:8px; min-height:0; max-height:40%; }
  .izleme-liste::-webkit-scrollbar { width:4px; }
  .izleme-liste::-webkit-scrollbar-thumb { background:#4a5568; border-radius:2px; }

  .yardim-bolum { padding:8px; border-top:1px solid #4a5568; flex-shrink:0; max-height:45%; overflow-y:auto; }
  .yardim-bolum-baslik { font-size:11px; font-weight:700; color:#90cdf4; margin-bottom:6px; display:flex; align-items:center; justify-content:space-between; }
  .yardim-rozet { background:#e53e3e; color:#fff; border-radius:10px; padding:0 6px; font-size:10px; }
  .yardim-kart { background:#1a202c; border:1px solid #4a5568; border-radius:6px; padding:6px 8px; margin-bottom:5px; font-size:11px; }
  .yardim-kart.yeni { border-color:#e53e3e; }
  .yardim-kart .ad { font-weight:700; color:#e2e8f0; }
  .yardim-kart .saat { color:#718096; font-size:10px; }
  .yardim-kart .btn-izle { padding:2px 8px; background:#2b6cb0; color:#fff; border:none; border-radius:3px; cursor:pointer; font-size:10px; margin-top:4px; margin-right:3px; }
  .yardim-kart .btn-tamam { padding:2px 8px; background:#276749; color:#fff; border:none; border-radius:3px; cursor:pointer; font-size:10px; margin-top:4px; }
  .izleme-panel-alani { flex:1; display:flex; flex-direction:column; border-top:1px solid #4a5568; min-height:0; }
  .izleme-panel-baslik { padding:6px 12px; background:#1a365d; color:#90cdf4; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .izleme-panel-baslik .izleme-butonlar { display:flex; gap:4px; }
  .izleme-panel-baslik .izleme-butonlar button { padding:3px 8px; border:none; border-radius:3px; cursor:pointer; font-size:11px; font-weight:600; }
  .izleme-terminal-wrap { flex:1; min-height:0; border:2px solid #4a5568; margin:4px; border-radius:4px; transition:border-color 0.3s; }

  .bildirim { position:fixed; bottom:16px; right:16px; background:#2d3748; border:1px solid #4a5568; padding:10px 18px; border-radius:6px; font-size:13px; z-index:99; display:none; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:12px">
    <h1>Ogretmen Terminal Yayini (Linux Container)</h1>
    <span class="info"><span class="durum" id="durum-led"></span><span id="durum-yazi">Baglanıyor...</span></span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="info">Bagli ogrenci: <span class="ogrenci-sayisi" id="ogrenci-sayisi">0</span></span>
    <button class="btn btn-temizle" onclick="ekraniTemizle()">Ekrani Temizle</button>
    <button class="btn btn-don" onclick="location.href='/teacher'">Panele Don</button>
  </div>
</div>

<div class="ana-icerik">
  <!-- Sol: Ogretmen Terminali -->
  <div class="terminal-area">
    <div class="panel-baslik">Ogretmen Terminali (Linux Container) -- Yazdiginiz her sey ogrencilere canli yayinlanir</div>
    <div class="terminal-wrap" id="term-ogretmen"></div>
  </div>

  <!-- Sag: Izleme Paneli -->
  <div class="izleme-sidebar">
    <div class="izleme-sidebar-baslik">Ogrenci Terminalleri</div>
    <div class="izleme-liste" id="izleme-ogrenci-listesi">
      <div style="color:#718096; font-size:12px; padding:8px;">Oturum yok</div>
    </div>

    <!-- Yardım Talepleri -->
    <div class="yardim-bolum">
      <div class="yardim-bolum-baslik">
        <span>🙋 Yardım Talepleri <span class="yardim-rozet" id="yardim-rozet" style="display:none;">0</span></span>
      </div>
      <div id="yardim-liste"><div style="color:#718096;font-size:11px;">Yok</div></div>
    </div>

    <div class="izleme-panel-alani" id="izleme-panel" style="border-color:#4a5568;">
      <div class="izleme-panel-baslik">
        <span id="izleme-durum">Izleme kapali</span>
        <div class="izleme-butonlar">
          <button id="mudahale-btn" onclick="mudahaleToggle()" style="background:#2b6cb0; color:#fff;">Mudahale Et</button>
          <button onclick="izlemeBirak()" style="background:#e53e3e; color:#fff;">Birak</button>
        </div>
      </div>
      <div class="izleme-terminal-wrap" id="izleme-terminal-container"></div>
    </div>
  </div>
</div>

<div class="bildirim" id="bildirim"></div>

<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
// ─── Ogretmen Terminal ───
var fitAddon = new FitAddon.FitAddon();

var term = new Terminal({
  cursorBlink: true,
  scrollback: 2000,
  theme: { background:'#0d1117', foreground:'#c9d1d9', cursor:'#ed8936' },
  fontSize: 15
});
term.loadAddon(fitAddon);
term.open(document.getElementById('term-ogretmen'));
fitAddon.fit();

// ─── Izleme Terminal ───
var izlemeFitAddon = new FitAddon.FitAddon();
var izlemeTerminal = new Terminal({
  cursorBlink: false,
  scrollback: 2000,
  theme: { background:'#0d1117', foreground:'#c9d1d9', cursor:'#3182ce' },
  fontSize: 13
  // disableStdin kaldırıldı: xterm.js v5'te dinamik değiştirilemiyor
  // Girdi kontrolü onData handler'da mudahaleAktif flag'i ile yapılıyor
});
izlemeTerminal.loadAddon(izlemeFitAddon);
izlemeTerminal.open(document.getElementById('izleme-terminal-container'));
izlemeFitAddon.fit();

var izlemeAktif = false;
var mudahaleAktif = false;

window.addEventListener('resize', function() {
  fitAddon.fit();
  izlemeFitAddon.fit();
});

// ─── Socket.IO ───
var socket = io('/terminal', { transports:['websocket','polling'] });

socket.on('connect', function() {
  document.getElementById('durum-led').classList.add('bagli');
  document.getElementById('durum-yazi').textContent = 'Bagli';
  socket.emit('ogretmen_baglan');
  ogrenciListesiGuncelle();
});

socket.on('disconnect', function() {
  document.getElementById('durum-led').classList.remove('bagli');
  document.getElementById('durum-yazi').textContent = 'Baglanti kesildi';
});

// Kendi ciktimi terminale yaz
socket.on('ogretmen_cikti', function(data) { term.write(data); });

// Bagli ogrenci sayisi
socket.on('bagli_ogrenci_sayisi', function(sayi) {
  document.getElementById('ogrenci-sayisi').textContent = sayi;
  ogrenciListesiGuncelle();
});

// Tus girisi -> sunucuya
term.onData(function(data) { socket.emit('ogretmen_girdi', { data: data }); });

// Ekrani temizle
function ekraniTemizle() {
  term.clear();
  socket.emit('ogretmen_temizle');
}

// ─── Izleme Fonksiyonlari ───

function ogrenciListesiGuncelle() {
  fetch('/api/terminal/aktif_oturumlar')
    .then(function(r) { return r.json(); })
    .then(function(veri) {
      var liste = document.getElementById('izleme-ogrenci-listesi');
      if (!liste) return;
      // Temizle
      while (liste.firstChild) { liste.removeChild(liste.firstChild); }

      if (!veri.oturumlar || veri.oturumlar.length === 0) {
        var bos = document.createElement('div');
        bos.style.cssText = 'color:#718096; font-size:12px; padding:8px;';
        bos.textContent = 'Aktif oturum yok';
        liste.appendChild(bos);
        return;
      }

      veri.oturumlar.forEach(function(o) {
        var satir = document.createElement('div');
        satir.style.cssText = 'display:flex; align-items:center; gap:4px; margin-bottom:4px;';

        var btn = document.createElement('button');
        btn.style.cssText = 'flex:1; text-align:left; padding:6px 10px; background:#1a202c; border:1px solid #4a5568; color:#e2e8f0; border-radius:6px; cursor:pointer; font-size:12px;';
        var durum = o.aktif ? ' [aktif]' : ' [bekliyor]';
        btn.textContent = o.username + durum;
        if (o.aktif) {
          btn.style.borderColor = '#48bb78';
        }
        btn.addEventListener('click', function() { izlemeBaslat(o.username); });

        var btnCikis = document.createElement('button');
        btnCikis.title = 'Zorla Çıkart';
        btnCikis.textContent = '🚪';
        btnCikis.style.cssText = 'padding:6px 8px; background:#c53030; border:none; color:white; border-radius:6px; cursor:pointer; font-size:12px; flex-shrink:0;';
        btnCikis.addEventListener('click', function() { ogrenciForceCikis(o.username); });

        satir.appendChild(btn);
        satir.appendChild(btnCikis);
        liste.appendChild(satir);
      });
    })
    .catch(function(e) {
      console.error('Ogrenci listesi hatasi:', e);
    });
}

function izlemeBaslat(username) {
  izlemeTerminal.clear();
  izlemeTerminal.reset();
  socket.emit('ogretmen_izle', { username: username });
  izlemeAktif = true;
  mudahaleAktif = false;
  document.getElementById('izleme-durum').textContent = 'Izleniyor: ' + username;
  document.getElementById('izleme-terminal-container').style.borderColor = '#3182ce';
  document.getElementById('mudahale-btn').textContent = 'Mudahale Et';
  document.getElementById('mudahale-btn').style.background = '#2b6cb0';
  // disableStdin kullanılmıyor: onData guard (izlemeAktif && mudahaleAktif) gönderimi kontrol eder
}

function izlemeBirak() {
  socket.emit('ogretmen_izle_birak');
  izlemeAktif = false;
  mudahaleAktif = false;
  document.getElementById('izleme-durum').textContent = 'Izleme kapali';
  document.getElementById('izleme-terminal-container').style.borderColor = '#4a5568';
  document.getElementById('mudahale-btn').textContent = 'Mudahale Et';
  document.getElementById('mudahale-btn').style.background = '#2b6cb0';
}

function mudahaleToggle() {
  if (!izlemeAktif) return;
  mudahaleAktif = !mudahaleAktif;
  socket.emit('ogretmen_mudahale_toggle', { aktif: mudahaleAktif });

  if (mudahaleAktif) {
    document.getElementById('izleme-terminal-container').style.borderColor = '#ed8936';
    document.getElementById('mudahale-btn').textContent = 'Mudahale Kapat';
    document.getElementById('mudahale-btn').style.background = '#e53e3e';
    izlemeTerminal.focus();
  } else {
    document.getElementById('izleme-terminal-container').style.borderColor = '#3182ce';
    document.getElementById('mudahale-btn').textContent = 'Mudahale Et';
    document.getElementById('mudahale-btn').style.background = '#2b6cb0';
  }
}

// Izleme terminalinden tus girisi (mudahale modunda)
izlemeTerminal.onData(function(data) {
  if (izlemeAktif && mudahaleAktif) {
    socket.emit('ogretmen_izle_girdi', { data: data });
  }
});

// Izleme ciktisi
socket.on('izleme_cikti', function(data) {
  if (izlemeTerminal) izlemeTerminal.write(data);
});

// Izleme basladi
socket.on('izleme_basladi', function(veri) {
  izlemeTerminal.writeln('\r\n--- ' + veri.username + ' terminali izleniyor ---\r\n');
});

// Izleme hatasi
socket.on('izleme_hata', function(msg) {
  var bildirim = document.getElementById('bildirim');
  bildirim.textContent = 'Izleme hatasi: ' + msg;
  bildirim.style.display = 'block';
  bildirim.style.borderColor = '#e53e3e';
  bildirim.style.color = '#fc8181';
  setTimeout(function() { bildirim.style.display = 'none'; }, 4000);
});

// Ogrenci listesini her 5 saniyede guncelle
setInterval(ogrenciListesiGuncelle, 5000);

// ─── Yardım Talepleri ───
function yardimTalepleriCek() {
  fetch('/api/yardim_talepler')
    .then(function(r) { return r.json(); })
    .then(function(veri) {
      var liste = document.getElementById('yardim-liste');
      var rozet = document.getElementById('yardim-rozet');
      if (!liste) return;

      var talepler = veri.talepler || [];
      var bekleyenler = talepler.filter(function(t) { return t.durum === 'bekliyor'; });

      if (bekleyenler.length > 0) {
        rozet.textContent = bekleyenler.length;
        rozet.style.display = 'inline';
      } else {
        rozet.style.display = 'none';
      }

      while (liste.firstChild) { liste.removeChild(liste.firstChild); }

      if (talepler.length === 0) {
        var bos = document.createElement('div');
        bos.style.cssText = 'color:#718096;font-size:11px;';
        bos.textContent = 'Yok';
        liste.appendChild(bos);
        return;
      }

      talepler.forEach(function(t) {
        var kart = document.createElement('div');
        kart.className = 'yardim-kart' + (t.durum === 'bekliyor' ? ' yeni' : '');

        var ad = document.createElement('div');
        ad.className = 'ad';
        ad.textContent = (t.ad_soyad || t.numara) + (t.kategori ? ' [' + t.kategori + ']' : '');

        var saat = document.createElement('div');
        saat.className = 'saat';
        saat.textContent = t.saat + ' — ' + t.numara;

        var btnIzle = document.createElement('button');
        btnIzle.className = 'btn-izle';
        btnIzle.textContent = '👁 İzle';
        btnIzle.addEventListener('click', function() { izlemeBaslat(t.numara); });

        var btnTamam = document.createElement('button');
        btnTamam.className = 'btn-tamam';
        btnTamam.textContent = '✔ Tamamlandı';
        btnTamam.addEventListener('click', function() {
          fetch('/api/yardim_kabul', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: t.id, durum: 'tamamlandi' })
          }).then(function() { yardimTalepleriCek(); });
        });

        kart.appendChild(ad);
        kart.appendChild(saat);
        kart.appendChild(btnIzle);
        kart.appendChild(btnTamam);
        liste.appendChild(kart);
      });
    })
    .catch(function() {});
}

yardimTalepleriCek();
setInterval(yardimTalepleriCek, 10000);

function ogrenciForceCikis(numara) {
  if (!confirm(numara + ' numaralı öğrenciyi zorla çıkartmak istiyor musunuz?')) return;
  fetch('/api/ogrenci_force_cikis', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ numara: numara })
  }).then(function(r) { return r.json(); })
    .then(function(v) {
      alert(v.durum === 'ok'
        ? '✅ ' + numara + ' çıkartıldı (5 sn içinde etkili olacak).'
        : '❌ Hata: ' + (v.mesaj || 'Bilinmeyen'));
    })
    .catch(function() { alert('Bağlantı hatası.'); });
}
</script>
</body>
</html>
