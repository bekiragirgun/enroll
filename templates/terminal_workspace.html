<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Terminal — {{ ad_soyad }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a202c;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: #2d3748;
      border-bottom: 2px solid #ed8936;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fbd38d;
    }

    .header .info {
      font-size: 13px;
      color: #a0aec0;
    }

    .btn-cikis {
      padding: 4px 14px;
      background: #e53e3e;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
    }

    .btn-cikis:hover {
      background: #c53030;
    }

    .workspace {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 8px;
      gap: 8px;
      min-height: 0;
    }

    .terminal-panel {
      display: flex;
      flex-direction: column;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #4299e1;
      min-height: 0;
    }

    .terminal-panel-header {
      padding: 6px 12px;
      background: #2a4365;
      color: #bee3f8;
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .terminal-wrap {
      flex: 1;
      min-height: 0;
      background: #000;
    }

    .ssh-info {
      background: #0f1117;
      border: 1px solid #48bb78;
      border-radius: 8px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }

    .ssh-info .command {
      color: #48bb78;
      font-weight: 600;
    }

    .ssh-info .hint {
      color: #a0aec0;
      font-size: 12px;
      margin-top: 4px;
    }
  </style>
</head>

<body>

  <div class="header">
    <div>
      <h1>💻 {{ ad_soyad }} — Terminal</h1>
      <div class="info">Numara: {{ numara }} | IP: {{ container_ip }}</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="btn-yardim" onclick="yardimIste()" style="padding:4px 14px;background:#2b6cb0;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;">🙋 Yardım İste</button>
      <a href="/" class="btn-cikis">Geri Dön</a>
    </div>
  </div>

  <div class="workspace">
    <!-- ÖĞRETMEN TERMİNALİ (ÜST %30) -->
    <div class="terminal-panel" style="flex: 0 0 30%;">
      <div class="terminal-panel-header"
        style="background: #744210; color: #fbd38d; display: flex; justify-content: space-between;">
        <span>👨‍🏫 ÖĞRETMEN EKRANI (İzleme)</span>
        <span id="teacher-command"
          style="font-family: 'Menlo', monospace; color: #68d391; font-weight: normal; margin-left: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 50%;"></span>
      </div>
      <div class="terminal-wrap" id="terminal-teacher"></div>
    </div>

    <!-- ÖĞRENCİ TERMİNALİ (ALT %70) -->
    <div class="terminal-panel" style="flex: 1;">
      <div class="terminal-panel-header">
        💻 SİZİN TERMİNALİNİZ
      </div>
      <div class="terminal-wrap" id="terminal-student"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    // --- Öğrenci Terminali ---
    const fitStudent = new FitAddon.FitAddon();
    const termStudent = new Terminal({
      cursorBlink: true,
      theme: { background: '#0d1117', foreground: '#c9d1d9', cursor: '#4299e1' },
      fontSize: 14,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace'
    });
    termStudent.loadAddon(fitStudent);
    termStudent.open(document.getElementById('terminal-student'));
    fitStudent.fit();

    // --- Öğretmen Terminali (Sadece İzleme) ---
    const fitTeacher = new FitAddon.FitAddon();
    const termTeacher = new Terminal({
      cursorBlink: false,
      disableStdin: true,
      theme: { background: '#1a1c23', foreground: '#cbd5e0' },
      fontSize: 12,
      fontFamily: 'Menlo, Monaco, "Courier New", monospace'
    });
    termTeacher.loadAddon(fitTeacher);
    termTeacher.open(document.getElementById('terminal-teacher'));
    fitTeacher.fit();

    window.addEventListener('resize', () => {
      fitStudent.fit();
      fitTeacher.fit();
    });

    // Socket.IO bağlantısı
    const socket = io('/terminal', { transports: ['websocket', 'polling'] });

    socket.on('connect', () => {
      console.log('Terminal bağlı');
      socket.emit('ogrenci_baglan', { username: '{{ numara }}' });
    });

    // Çıktıları yönlendir
    socket.on('terminal_cikti', data => termStudent.write(data));
    socket.on('ogretmen_cikti', data => termTeacher.write(data));
    socket.on('hata', msg => termStudent.write('\r\n\x1b[31m' + msg + '\x1b[0m\r\n'));

    // Son komutu başlıkta göster
    socket.on('ogretmen_komut', cmd => {
      const el = document.getElementById('teacher-command');
      if (el) {
        el.textContent = '> ' + cmd;
        // 5 saniye sonra veya yeni bir komut gelmeden önce hafifçe silikleşebilir vs.
      }
    });

    socket.on('ogretmen_temizle', () => {
      termTeacher.clear();
      const el = document.getElementById('teacher-command');
      if (el) el.textContent = '';
    });

    // Girdileri gönder
    termStudent.onData(data => {
      socket.emit('terminal_girdi', { data: data });
    });

    // ─── Yardım İsteği ───
    async function yardimIste() {
      const btn = document.getElementById('btn-yardim');
      btn.disabled = true;
      btn.textContent = '⏳ Gönderiliyor...';
      try {
        const res = await fetch('/api/yardim_talep', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ kategori: 'terminal' })
        });
        const veri = await res.json();
        if (veri.durum === 'ok') {
          btn.textContent = '✅ İstek Gönderildi';
          btn.style.background = '#276749';
          setTimeout(() => {
            btn.disabled = false;
            btn.textContent = '🙋 Yardım İste';
            btn.style.background = '#2b6cb0';
          }, 30000); // 30 saniye sonra tekrar aktif
        } else {
          btn.textContent = veri.mesaj || 'Zaten istek var';
          btn.style.background = '#744210';
          setTimeout(() => {
            btn.disabled = false;
            btn.textContent = '🙋 Yardım İste';
            btn.style.background = '#2b6cb0';
          }, 5000);
        }
      } catch(e) {
        btn.disabled = false;
        btn.textContent = '🙋 Yardım İste';
      }
    }
  </script>

</body>

</html>
