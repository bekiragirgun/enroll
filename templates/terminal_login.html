<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Giriş — Linux Lab</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0f1117; color:#e2e8f0; font-family:system-ui,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }

  .login-container {
    background: rgba(26, 31, 46, 0.95);
    border: 1px solid #2d3748;
    border-radius: 20px;
    padding: 3rem;
    width: 100%;
    max-width: 450px;
    box-shadow: 0 25px 80px rgba(0,0,0,0.5);
  }

  .logo { text-align:center; margin-bottom:2rem; }
  .logo h1 { font-size:1.5rem; color:#90cdf4; margin-bottom:0.5rem; }
  .logo p { color:#718096; font-size:0.9rem; }

  .form-group { margin-bottom:1.5rem; }
  .form-group label { display:block; color:#cbd5e0; font-size:0.9rem; font-weight:600; margin-bottom:0.5rem; }
  .form-group input { width:100%; padding:0.85rem 1rem; background:#0f1117; border:1px solid #4a5568; border-radius:10px; color:#e2e8f0; font-size:1rem; box-sizing:border-box; }
  .form-group input:focus { outline:none; border-color:#4299e1; box-shadow:0 0 0 3px rgba(66,153,225,0.2); }

  .btn-submit { width:100%; padding:1rem; background:linear-gradient(135deg, #4299e1 0%, #3182ce 100%); color:white; border:none; border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer; }
  .btn-submit:hover { transform:translateY(-2px); box-shadow:0 10px 30px rgba(66,153,225,0.3); }

  .error { background:rgba(229,62,62,0.1); border:1px solid #e53e3e; border-radius:10px; padding:1rem; margin-bottom:1.5rem; color:#fc8181; font-size:0.9rem; text-align:center; }

  .info-box { background:rgba(66,153,225,0.1); border:1px solid #4299e1; border-radius:10px; padding:1rem; margin-top:2rem; font-size:0.85rem; color:#90cdf4; }
</style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <h1>💻 Linux Terminal</h1>
    <p>Kapadokya Üniversitesi — BGY106</p>
  </div>

  {% if hata %}
  <div class="error">⚠️ {{ hata }}</div>
  {% endif %}

  <form method="POST" action="/terminal/login">
    <div class="form-group">
      <label for="ad">Ad</label>
      <input type="text" id="ad" name="ad" required placeholder="Örn: Bekir" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="soyad">Soyad</label>
      <input type="text" id="soyad" name="soyad" required placeholder="Örn: Ağırğün" autocomplete="off">
    </div>

    <div class="form-group">
      <label for="numara">Öğrenci Numarası</label>
      <input type="text" id="numara" name="numara" required placeholder="Örn: 220001001" pattern="[0-9]+" autocomplete="off">
    </div>

    <button type="submit" class="btn-submit">🚀 Terminal Bağlantısı Al</button>
  </form>

  <div class="info-box">
    <strong>ℹ️ Bilgi:</strong> Sizin için özel bir Linux container oluşturulacak.
    <code>sudo su -</code> ile root erişimi var.
  </div>

  <div style="text-align:center; margin-top:1.5rem;">
    <a href="/" style="color:#718096; text-decoration:none; font-size:0.9rem;">← Ana Sayfaya Dön</a>
  </div>
</div>

</body>
</html>
