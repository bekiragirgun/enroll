<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BGY106 Linux İşletim Sistemi</title>
  <link rel="stylesheet" href="/static/css/stil.css">
</head>

<body data-mod="bekleme">

  <!-- TAM EKRAN BUTONU (Sağ Alt) -->
  <button id="full-screen-btn" title="Tam Ekran" onclick="toggleFullScreen()">
    ⛶
  </button>

  <!-- DERSE KATIL OVERLAY -->
  <div id="join-overlay" class="join-overlay">
    <div style="font-size: 4rem; margin-bottom: 1rem;">🎓</div>
    <h2 id="join-status">Ders Başladı!</h2>
    <p style="color: #a0aec0; margin-bottom: 2rem;">Derse katılmak ve tam ekrana geçmek için butona tıklayın.</p>
    <button class="join-btn" onclick="startLessonFullscreen()">Derse Katıl</button>
  </div>

  <!-- BEKLEME EKRANI -->
  <div id="bekleme-ekrani" class="bekleme-ekrani" style="display:flex;">
    <div class="onay-ikonu">👤</div>
    <h2>{{ ad_soyad }}</h2>
    <p style="color:#a0aec0; font-size:1.1rem; margin-top:1rem;">
      Öğretmen girişini bekleyiniz...
    </p>
  </div>

  <!-- SLAYT EKRANI -->
  <div id="slayt-ekrani" class="slayt-ekrani" style="display:none;">
    <iframe id="slayt-iframe" src="" allowfullscreen></iframe>
  </div>

  <!-- TERMİNAL EKRANI -->
  <div id="terminal-ekrani" class="terminal-ekrani" style="display:none;">
    <div id="terminal-loading"
      style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;">
      <div style="font-size:3rem;margin-bottom:1rem;">⏳</div>
      <div style="color:#90cdf4;font-size:1.2rem;">Terminal yükleniyor...</div>
    </div>
    <iframe id="terminal-iframe" src="" allowfullscreen></iframe>
  </div>

  <!-- SINAV EKRANI -->
  <div id="sinav-ekrani" class="sinav-ekrani"
    style="display:none; padding:2rem; max-width:800px; margin:0 auto; width:100%; height:100%; overflow-y:auto; background:#1a202c; color:#e2e8f0;">
    <h2 id="ogrenci-sinav-baslik"
      style="color:#90cdf4; border-bottom:2px solid #2b6cb0; padding-bottom:0.5rem; margin-top:2rem;">Sınav
      Yükleniyor...</h2>
    <div id="ogrenci-sorular-alani" style="margin-top:1.5rem;"></div>
    <div id="sinav-bitis-mesaji"
      style="display:none; text-align:center; padding:3rem 1rem; background:#2d3748; border-radius:12px; margin-top:2rem;">
      <div style="font-size:4rem; margin-bottom:1rem;">✅</div>
      <h3 style="color:#48bb78; margin-bottom:0.5rem;">Sınav Tamamlandı</h3>
      <p style="color:#a0aec0;">Cevaplarınız başarıyla kaydedildi. Öğretmeniniz sonucu açıklayacaktır.</p>
    </div>
    <button id="btn-sinav-gonder" class="join-btn" style="margin-top:2rem; width:100%; display:none;"
      onclick="sinavCevaplariniGonder()">Cevapları Gönder</button>
  </div>

  <div id="cikis-talep-alani"
    style="position:fixed; bottom:20px; right:20px; z-index:9999; display:none; flex-direction:column; gap:10px;">
    <button onclick="yardimTalepEt()" id="btn-yardim-talep"
      style="background:#2b6cb0; color:white; border:none; padding:10px 15px; border-radius:8px; font-weight:bold; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.3);">
      🙋‍♂️ Yardım İste
    </button>
    <button onclick="cikisTalepEt()" id="btn-cikis-talep"
      style="background:#c53030; color:white; border:none; padding:10px 15px; border-radius:8px; font-weight:bold; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.3);">
      🚪 Çıkış Talep Et
    </button>
  </div>

  <script src="/static/js/ogrenci.js"></script>
</body>

</html>
