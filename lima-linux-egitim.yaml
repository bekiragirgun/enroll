# Lima Linux Eğitim Ortamı
# Apple Silicon (ARM64) için optimize edilmiş

vmType: "qemu"
os: "Linux"
arch: "aarch64"
images:
  # Ubuntu 22.04 LTS ARM64
  - location: "https://cloud-images.ubuntu.com/releases/22.04/release/ubuntu-22.04-server-cloudimg-arm64.img"
    arch: "aarch64"
    digest: "sha256:6cbbbe026839a79e1a3e6f203deaee46f2d8011a4e7550e0731c1fbe9f4e0d1f"

cpus: 2
memory: 2GB
disk: 20GB

mounts:
  - location: "~"
    writable: false
  - location: "./shared"
    writable: true

ssh:
  localPort: 60022
  loadDotSSHPubKeys: true
  forwardAgent: false

firmware:
  legacyBIOS: false

video:
  display: "none"

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -e

      echo "🐧 Linux eğitim ortamı hazırlanıyor..."

      # Sistem güncellemesi
      apt-get update
      apt-get upgrade -y

      # Temel araçlar
      apt-get install -y \
          bash-completion \
          curl \
          wget \
          vim \
          nano \
          htop \
          btop \
          tree \
          file \
          less \
          tmux \
          screen \
          man-db \
          ca-certificates \
          software-properties-common \
          apt-transport-https \
          git

      # Network araçları
      apt-get install -y \
          iproute2 \
          iputils-ping \
          traceroute \
          net-tools \
          dnsutils \
          netcat \
          nmap \
          tcpdump \
          curl \
          wget \
          openssh-server \
          openssh-client \
          telnet \
          rsync \
          iptables \
          conntrack \
          ethtool \
          mtr-tiny \
          bind9-dnsutils \
          bind9-host

      # Sistem yönetimi
      apt-get install -y \
          systemd \
          systemd-sysv \
          cron \
          rsyslog \
          logrotate \
          acl \
          quota \
          fdisk \
          gdisk \
          parted \
          lvm2 \
          mdadm \
          util-linux \
          smartmontools \
          hdparm \
          lshw \
          lm-sensors \
          pciutils \
          usbutils

      # Process monitoring
      apt-get install -y \
          procps \
          lsof \
          strace \
          sysstat \
          glances \
          iotop

      # Geliştirme araçları
      apt-get install -y \
          build-essential \
          gcc \
          g++ \
          make \
          cmake \
          git \
          python3 \
          python3-pip \
          python3-dev \
          python3-venv \
          perl \
          php \
          nodejs \
          npm \
          golang \
          rustc

      # Web sunucu
      apt-get install -y \
          apache2 \
          nginx-light \
          sqlite3

      # Güvenlik
      apt-get install -y \
          ufw \
          fail2ban \
          rkhunter \
          chkrootkit \
          auditd \
          openssl

      # Diğer araçlar
      apt-get install -y \
          zip \
          unzip \
          tar \
          gzip \
          bzip2 \
          xz-utils \
          p7zip-full \
          tree \
          htop

      # Servisleri başlat
      systemctl enable ssh
      systemctl enable cron
      systemctl enable rsyslog

      # Öğrenci kullanıcısı
      if ! id ogrenci &>/dev/null; then
          useradd -m -s /bin/bash -G sudo,dialout,cdrom,floppy,audio,dip,video,plugdev,netdev ogrenci
          echo "ogrenci:ogrenci" | chpasswd
          echo "ogrenci ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers.d/ogrenci
          chmod 440 /etc/sudoers.d/ogrenci
      fi

      # Bash yapılandırması
      cat >> /home/ogrenci/.bashrc << 'EOF'

      # Linux eğitim ortamı
      export EDITOR=vim
      export VISUAL=vim
      export HISTSIZE=10000
      export HISTFILESIZE=20000
      export HISTTIMEFORMAT="%F %T "
      shopt -s histappend
      shopt -s cmdhist

      # Renkli prompt
      PS1='\[\033[01;32m\]\u@\h\[\033[00m\]:\[\033[01;34m\]\w\[\033[00m\]\$ '

      # Aliaslar
      alias ll='ls -lah'
      alias la='ls -A'
      alias l='ls -CF'
      alias ..='cd ..'
      alias grep='grep --color=auto'
      alias df='df -h'
      alias du='du -h'
      alias free='free -h'
      alias tree='tree -a'
      alias ip='ip -color=auto'
      alias journalctl='journalctl --no-pager'
      alias systemctl='systemctl --no-pager'

      # Sistem bilgisi
      sysinfo() {
          echo "=== Sistem Bilgileri ==="
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "CPU: $(nproc) çekirdek"
          echo "Memory: $(free -h | grep Mem | awk '{print $2}')"
          echo "Disk: $(df -h / | tail -1 | awk '{print $2}')"
          echo "IP: $(ip -4 addr show | grep inet | grep -v 127.0.0.1 | awk '{print $2}' | cut -d/ -f1)"
      }

      EOF

      chown ogrenci:ogrenci /home/ogrenci/.bashrc

      # Dizinler oluşturma
      mkdir -p /home/ogrenci/{egitim,pratik,testler,loglar}
      chown -R ogrenci:ogrenci /home/ogrenci

      # Temizlik
      apt-get clean
      rm -rf /var/lib/apt/lists/*

      echo "✅ Linux eğitim ortamı hazır!"

provisionMode: system
containerd:
  system: false
  user: false

env:
  DISPLAY: host.kvm.internal:0
