# Chroot Terminal PTY Limits
# Her ogrenci 1 SSH + 1 chroot PTY = 2 PTY tuketir
# 40 ogrenci * 2 = 80 PTY minimum + yedek

# Toplam PTY limiti (varsayilan 4096, biz 8192 yapiyoruz)
kernel.pty.max = 8192

# PTY instance basina limit (her /dev/pts mount icin)
kernel.pty.reserve = 256

# File descriptor limiti (PTY'ler fd tuketir)
fs.file-max = 65536
fs.nr_open = 65536
