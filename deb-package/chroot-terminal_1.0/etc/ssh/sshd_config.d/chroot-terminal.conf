# ============================================
# Chroot Terminal — SSH Optimizasyonu
# Kapadokya University Linux Lab
# ============================================

# ── Baglanti Limitleri ───────────────────────
# 60 ogrenci + ogretmen + yonetim baglantilari
MaxSessions 80
MaxStartups 50:60:100

# ── Keepalive ────────────────────────────────
# Zombie oturumlari 60 saniyede tespit et
ClientAliveInterval 20
ClientAliveCountMax 3

# ── Timeout ──────────────────────────────────
LoginGraceTime 30
TCPKeepAlive yes

# ── Performans ───────────────────────────────
# Compression kapatildi (LAN icin gereksiz, CPU tasarrufu)
Compression no
# DNS lookup kapatildi (hiz)
UseDNS no
# GSSAPI kapatildi (hiz)
GSSAPIAuthentication no

# ── Multiplexing ─────────────────────────────
StreamLocalBindUnlink yes

# ── Loglama ──────────────────────────────────
LogLevel INFO
