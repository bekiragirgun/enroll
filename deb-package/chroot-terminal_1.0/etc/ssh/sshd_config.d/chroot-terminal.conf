# Chroot Terminal SSH Optimization
# Kapadokya University Linux Lab

# Esanlamli baglanti limitleri
MaxSessions 50
MaxStartups 30:50:80

# Keepalive - zombie oturumlari tespit et ve oldur
ClientAliveInterval 30
ClientAliveCountMax 3

# Login grace - yavas baglantilar icin timeout
LoginGraceTime 60

# PTY tahsis icin yeterli kaynak
# UsePAM yes zaten varsayilan, PTY icin gerekli

# Multiplexing sorunlarini onle
StreamLocalBindUnlink yes
