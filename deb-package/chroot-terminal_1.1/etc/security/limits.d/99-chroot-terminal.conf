# ── Tum kullanicilar ─────────────────────────
# Max open files (PTY + SSH + chroot fd'leri)
*               soft    nofile          65536
*               hard    nofile          65536

# Max user processes (her ogrenci ~5-10 process)
*               soft    nproc           32768
*               hard    nproc           32768

# Max pending signals
*               soft    sigpending      32768
*               hard    sigpending      32768

# Max locked memory (KB)
*               soft    memlock         65536
*               hard    memlock         65536

# ── Root kullanici ───────────────────────────
root            soft    nofile          131072
root            hard    nofile          131072
root            soft    nproc           65536
root            hard    nproc           65536

# ── Ogrenci grubu (chroot icinde) ───────────
# Ogrenci basina kaynak siniri (fork bomb koruması)
@ogrenciler     soft    nproc           256
@ogrenciler     hard    nproc           512
@ogrenciler     soft    nofile          4096
@ogrenciler     hard    nofile          8192
@ogrenciler     soft    as              1048576
@ogrenciler     hard    as              2097152
