# ============================================
# Chroot Terminal — Kernel Optimizasyonu
# Kapadokya University Linux Lab
# ============================================

# ── PTY Limitleri ────────────────────────────
# Her ogrenci 1 SSH + 1 chroot PTY = 2 PTY
# 60 ogrenci * 2 = 120 PTY + yedek
kernel.pty.max = 16384
kernel.pty.reserve = 512

# ── File Descriptor Limitleri ────────────────
# PTY, SSH, chroot process'leri fd tuketir
fs.file-max = 262144
fs.nr_open = 262144

# ── Process Limitleri ────────────────────────
# Fork bomb koruması (ogrenci basina)
kernel.threads-max = 32768
vm.max_map_count = 262144
kernel.pid_max = 65536

# ── Bellek Yonetimi ─────────────────────────
# Overcommit: chroot'lar icin onemli
vm.overcommit_memory = 1
vm.swappiness = 10
vm.dirty_ratio = 20
vm.dirty_background_ratio = 5

# ── Network — SSH Performansi ────────────────
# TCP backlog (cok sayida esanlamli SSH icin)
net.core.somaxconn = 4096
net.core.netdev_max_backlog = 4096
net.ipv4.tcp_max_syn_backlog = 4096

# TCP keepalive (zombie baglantilari erken tespit)
net.ipv4.tcp_keepalive_time = 120
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 3

# TCP fin timeout (port geri donusumu hizlandir)
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_tw_reuse = 1

# Local port range (cok sayida SSH baglantisi icin)
net.ipv4.ip_local_port_range = 10240 65535

# TCP buffer (performans)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# ── IPC / Shared Memory ─────────────────────
kernel.shmmax = 268435456
kernel.shmall = 65536
kernel.msgmax = 65536
kernel.msgmnb = 65536

# ── Guvenlik ─────────────────────────────────
# SYN flood koruması
net.ipv4.tcp_syncookies = 1
# ICMP redirect devre disi (guvenlik)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
# IP spoofing koruması
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
