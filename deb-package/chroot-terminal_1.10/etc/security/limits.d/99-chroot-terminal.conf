# Parallels/VM uyumlu değerler (kernel izin verdiği kadar)

# ── Tum kullanicilar ─────────────────────────
*               soft    nofile          4096
*               hard    nofile          8192

*               soft    nproc           4096
*               hard    nproc           8192

*               soft    sigpending      8192
*               hard    sigpending      8192

*               soft    memlock         8192
*               hard    memlock         16384

# ── Root kullanici ───────────────────────────
root            soft    nofile          8192
root            hard    nofile          16384
root            soft    nproc           8192
root            hard    nproc           16384

# ── Ogrenci grubu (chroot icinde) ───────────
@ogrenciler     soft    nproc           256
@ogrenciler     hard    nproc           512
@ogrenciler     soft    nofile          1024
@ogrenciler     hard    nofile          2048
@ogrenciler     soft    as              1048576
@ogrenciler     hard    as              2097152
