# ============================================
# Chroot Terminal — Kernel Optimizasyonu
# Kapadokya University Linux Lab
# ============================================
# Parallels/VM uyumlu — RLIMIT sorununa yol açan
# agresif değerler kaldırıldı. "-" prefix: desteklenmiyorsa atla.

# ── PTY Limitleri ────────────────────────────
-kernel.pty.max = 4096
-kernel.pty.reserve = 256

# ── Bellek Yonetimi ─────────────────────────
-vm.swappiness = 10
-vm.dirty_ratio = 20
-vm.dirty_background_ratio = 5

# ── Network — SSH Performansi ────────────────
-net.core.somaxconn = 1024
-net.ipv4.tcp_max_syn_backlog = 1024

# TCP keepalive
-net.ipv4.tcp_keepalive_time = 120
-net.ipv4.tcp_keepalive_intvl = 30
-net.ipv4.tcp_keepalive_probes = 3

# TCP fin timeout
-net.ipv4.tcp_fin_timeout = 15

# ── Guvenlik ─────────────────────────────────
-net.ipv4.tcp_syncookies = 1
-net.ipv4.conf.all.accept_redirects = 0
-net.ipv4.conf.default.accept_redirects = 0
